<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masterscan NDT Report Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap"
        rel="stylesheet" <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --primary-navy: #003366;
            --secondary-gold: #C9A84C;
            --accent-red: #CC0000;
            --bg-light: #F4F7F9;
            --white: #FFFFFF;
            --text-dark: #1A1A1A;
            --text-muted: #666666;
            --border-color: #E0E0E0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .heading {
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* LAYOUT */
        .app-container {
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary-navy);
            color: var(--white);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            width: auto;
        }

        .header-logo-img {
            height: 60px;
            width: auto;
            max-width: 100%;
        }

        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* SCREENS */
        .screen {
            display: none;
            padding: 1.5rem;
            flex: 1;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HOME SCREEN */
        .home-card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            max-width: 500px;
            margin: 4rem auto;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--primary-navy);
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary-navy);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: none;
        }

        .autocomplete-item {
            padding: 10px 16px;
            cursor: pointer;
        }

        .autocomplete-item:hover {
            background: var(--bg-light);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-navy);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #002244;
        }

        .btn-gold {
            background: var(--secondary-gold);
            color: var(--white);
        }

        /* WIZARD PROGRESS */
        .wizard-header {
            background: var(--white);
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 64px;
            z-index: 90;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-color);
            z-index: 1;
            transform: translateY(-50%);
        }

        .progress-step {
            width: 32px;
            height: 32px;
            background: var(--white);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
            transition: var(--transition);
            font-size: 0.8rem;
        }

        .progress-step.active {
            border-color: var(--primary-navy);
            background: var(--primary-navy);
            color: var(--white);
        }

        .progress-step.completed {
            border-color: var(--primary-navy);
            background: var(--primary-navy);
            color: var(--white);
        }

        /* REPORT ENTRY FIELDS */
        .report-section {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--primary-navy);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--secondary-gold);
            display: inline-block;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .field-textarea {
            grid-column: 1 / -1;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
        }

        /* DATA TABLE */
        .table-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--white);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: var(--primary-navy);
            color: var(--white);
            text-align: left;
            padding: 10px;
            white-space: nowrap;
        }

        td {
            border: 1px solid var(--border-color);
            padding: 0;
        }

        td input {
            width: 100%;
            padding: 8px;
            border: none;
            outline: none;
            background: transparent;
        }

        /* IMAGES */
        .image-grid {
            display: grid;
            gap: 15px;
            margin-top: 1rem;
        }

        .image-card {
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            aspect-ratio: 4/3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            background: #fafafa;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .image-caption {
            width: 100%;
            padding: 8px;
            border: none;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
        }

        /* SIGNATURE */
        .signature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .signature-box {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .sig-canvas-placeholder {
            width: 100%;
            height: 100px;
            background: #eee;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
        }

        @media print {

            .wizard-nav,
            .action-bar,
            .wizard-header,
            header,
            .no-print {
                display: none !important;
            }

            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .preview-container {
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                width: 100% !important;
                max-width: none !important;
            }

            .preview-page {
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                page-break-after: always;
                width: 200mm !important;
                height: 275mm !important;
                min-height: 275mm !important;
            }

            @page {
                size: A4;
                margin: 0;
            }
        }

        .action-bar {
            position: sticky;
            top: 0;
            background: rgba(0, 34, 68, 0.95);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--secondary-gold);
        }

        .preview-container {
            width: 210mm;
            margin: 20px auto;
            padding: 20px;
        }



        /* MODALS */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: var(--white);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            padding: 1.5rem;
        }

        canvas#signature-canvas {
            border: 1px solid #ccc;
            background: #fff;
            width: 100%;
            height: 300px;
            touch-action: none;
        }

        /* STICKY NAV */
        .sticky-footer {
            background: var(--white);
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            position: sticky;
            bottom: 0;
            z-index: 90;
        }

        /* PREVIEW */
        .preview-page {
            background: var(--white);
            box-shadow: var(--shadow);
            width: 210mm;
            /* A4 width */
            min-height: 297mm;
            margin: 20px auto;
            padding: 8mm 8mm 3mm 8mm;
            position: relative;
            border: 1px solid #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        @media (max-width: 210mm) {
            .preview-page {
                width: 98vw;
                margin: 10px auto;
                padding: 10px;
                min-height: auto;
            }
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-navy);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="logo-section">
                <img src="logo.jpg" alt="Masterscan Engineering" class="header-logo-img">
            </div>
            <div class="header-title">
                MASTERSCAN
            </div>
            <div id="offline-indicator" style="display: none;">
                <span
                    style="background: var(--accent-red); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;">OFFLINE</span>
            </div>
        </header>

        <!-- HOME SCREEN -->
        <main id="screen-home" class="screen active">
            <div class="home-card">
                <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary-navy);">New Inspection Report
                </h2>

                <div class="input-group">
                    <label>Department</label>
                    <select id="home-dept">
                        <option value="HT">Hardness Test Report (HT)</option>
                        <option value="MPT">Magnetic Particle Test Report (MPT)</option>
                        <option value="PMI">Positive Material Identification (PMI)</option>
                        <option value="UTG">Ultrasonic Thickness Gauging (UTG)</option>
                        <option value="PT" selected>Liquid Penetrant Test Report (PT)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Client Name</label>
                    <input type="text" id="home-client" placeholder="Type client name..." autocomplete="off">
                    <div id="client-autocomplete" class="autocomplete-dropdown"></div>
                </div>

                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="home-date">
                </div>

                <button class="btn btn-primary" onclick="app.startReport()">Open Report</button>
                <button class="btn btn-gold" style="margin-top: 10px; background: #666;"
                    onclick="app.loadSampleData()">Load Sample Data</button>

                <div id="resume-draft-container"
                    style="display: none; margin-top: 1.5rem; text-align: center; border-top: 1px solid #eee; padding-top: 1rem;">
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Unfinished report
                        detected</p>
                    <button class="btn btn-gold" style="padding: 10px;" onclick="app.resumeDraft()">Resume
                        Draft</button>
                </div>

                <div
                    style="margin-top: 2rem; padding: 1rem; background: rgba(0,0,0,0.02); border-radius: 8px; border: 1px solid #eee; text-align: center;">
                    <p style="margin-bottom: 0.5rem; font-size: 0.8rem; color: #666;">Load existing report from Drive
                    </p>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="load-doc-id" placeholder="Google Doc ID"
                            style="flex: 1; padding: 8px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #ddd;">
                        <button class="btn btn-gold" style="width: auto; padding: 8px 12px; font-size: 0.8rem;"
                            onclick="app.loadReport()">Load</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- WIZARD SCREENS -->
        <div id="wizard-container" style="display: none;">
            <div class="wizard-header">
                <div class="progress-bar">
                    <div class="progress-step active" data-step="1">1</div>
                    <div class="progress-step" data-step="2">2</div>
                    <div class="progress-step" data-step="3">3</div>
                    <div class="progress-step" data-step="4">4</div>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 0.8rem; font-weight: bold; color: var(--primary-navy);"
                    id="step-label">
                    STEP 1: REPORT DETAILS
                </div>
            </div>

            <!-- STEP 1: DETAILS -->
            <main id="screen-step-1" class="screen">
                <div id="dept-fields-container">
                    <!-- Dynamically injected fields -->
                </div>
            </main>

            <!-- STEP 2: DATA TABLE -->
            <main id="screen-step-2" class="screen">
                <div class="report-section">
                    <div class="section-title">Data Table Entry</div>
                    <div class="table-controls">
                        <button class="btn btn-gold" style="width: auto; padding: 8px 16px;" onclick="app.addRow()">+
                            Add Row</button>
                        <button class="btn btn-primary" style="width: auto; padding: 8px 16px;"
                            onclick="document.getElementById('excel-upload').click()">Upload Excel</button>
                        <input type="file" id="excel-upload" style="display: none;" accept=".xlsx,.xls"
                            onchange="app.handleExcelUpload(this)">
                    </div>
                    <div class="table-container">
                        <table id="data-table">
                            <thead id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </main>

            <!-- STEP 3: IMAGES -->
            <main id="screen-step-3" class="screen">
                <div class="report-section">
                    <div class="section-title">Photo Evidence</div>
                    <div style="display: flex; gap: 20px; margin-bottom: 1rem; align-items: center;">
                        <div>Rows: <button onclick="app.adjustGrid('rows', -1)">-</button> <span id="grid-rows">2</span>
                            <button onclick="app.adjustGrid('rows', 1)">+</button>
                        </div>
                        <div>Cols: <button onclick="app.adjustGrid('cols', -1)">-</button> <span id="grid-cols">3</span>
                            <button onclick="app.adjustGrid('cols', 1)">+</button>
                        </div>
                    </div>
                    <div id="image-grid" class="image-grid"></div>
                </div>
            </main>

            <!-- STEP 4: SIGNATURES -->
            <main id="screen-step-4" class="screen">
                <div class="report-section">
                    <div class="section-title">Approval Signatures</div>
                    <div class="signature-grid" id="signature-container">
                        <!-- Dynamic signature boxes -->
                    </div>
                </div>
            </main>

            <!-- PREVIEW SCREEN -->
            <main id="screen-preview" class="screen" style="padding: 0;">
                <div class="action-bar no-print">
                    <button class="btn btn-gold" style="width: auto;" onclick="window.print()">
                        <i class="fas fa-print"></i> PRINT PREVIEW (PDF)
                    </button>
                    <button class="btn btn-primary" style="width: auto;" onclick="app.saveReport()">
                        <i class="fas fa-save"></i> SAVE TO DRIVE & DOC
                    </button>
                    <button class="btn" style="width: auto; background: #666; color: white;" onclick="app.goToStep(4)">
                        <i class="fas fa-edit"></i> BACK
                    </button>
                </div>
                <div id="preview-container" class="preview-container">
                    <!-- PDF-like preview generated here -->
                </div>
            </main>

            <div class="sticky-footer" id="wizard-nav">
                <button class="btn btn-gold" id="btn-back" onclick="app.prevStep()" style="flex: 1;">Back</button>
                <button class="btn btn-primary" id="btn-next" onclick="app.nextStep()" style="flex: 2;">Next</button>
            </div>
        </div>

        <!-- SUCCESS SCREEN -->
        <main id="screen-success" class="screen">
            <div class="home-card" style="text-align: center;">
                <div style="font-size: 4rem; color: #4CAF50; margin-bottom: 1rem;">✓</div>
                <h2>Report Saved Successfully</h2>
                <p id="success-path" style="margin: 1rem 0; color: var(--text-muted);"></p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a id="drive-link" href="#" target="_blank" class="btn btn-primary"
                        style="text-decoration: none;">OPEN DRIVE FOLDER</a>
                    <a id="pdf-link" href="#" target="_blank" class="btn btn-gold"
                        style="text-decoration: none;">DOWNLOAD PDF REPORT</a>
                    <button class="btn" style="background: #333; color: white;" onclick="location.reload()">NEW
                        REPORT</button>
                </div>
            </div>
        </main>

        <!-- SIGNATURE MODAL -->
        <div id="sig-modal" class="modal">
            <div class="modal-content">
                <h3 id="sig-title">Signature</h3>
                <canvas id="signature-canvas"></canvas>
                <div style="display: flex; gap: 10px; margin-top: 1rem;">
                    <button class="btn btn-gold" onclick="app.clearSignature()">Clear</button>
                    <button class="btn btn-primary" onclick="app.saveSignature()">Done</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        /**
         * APP CONFIGURATION
         * Data-driven approach for multi-department support
         */
        const CONFIG = {
            departments: {
                HT: {
                    title: "HARDNESS TEST REPORT",
                    fields: ["CLIENT", "OWNER", "LOCATION", "PROJECT TITLE", "WO NO", "SIZE/THK", "PROCEDURE", "MATERIAL", "MODEL", "SERIAL NO", "MEASUREMENT TYPE", "IMPACT DEVICE", "BLOCK HARDNESS", "SPECIFIED HARDNESS", "PM", "HAZ", "WELD", "HB", "ACCEPTANCE REFERENCE"],
                    textareas: ["SCOPE OF EXAMINATION", "NOTE"],
                    columns: ["S.NO", "DRAWING NO./SHT NO.", "JOINT NO", "SIZE (inch)", "SCH (THK)", "SPOT", "READING 1", "READING 2", "READING 3", "READING 4", "READING 5", "AVE-HB", "REMARKS"]
                },
                MPT: {
                    title: "MAGNETIC PARTICLE TEST REPORT",
                    fields: ["CLIENT", "OWNER", "CONTRACTOR", "LOCATION", "PROJECT TITLE", "REQUEST NO", "DESCRIPTION", "ITEM TESTED", "TEST PROCEDURE / DOC NO", "ACCEPTANCE SPEC", "TEST METHOD", "EQUIPMENT", "POLE SPACING", "CALIBRATION", "SURFACE CONDITION", "MATERIAL", "SURFACE TEMPERATURE", "CONTRAST PAINT", "LOT NO (PAINT)", "MAGNETIC INK", "LOT NO (INK)", "PARTICLE APPLICATION", "LIGHT METER SERIAL NO", "LIGHT/SOURCE INTENSITY"],
                    textareas: ["SCOPE OF EXAMINATION", "AREA OF EXAMINATION", "FINDINGS"],
                    columns: ["S/N", "ISO DRAWING", "LINE NO", "REV", "JOINT NO", "SIZE-THK", "MATERIAL", "WELDER NO", "WPS NO", "SHT NO", "WELDING PROCESS", "WELD TYPE", "Distance", "Type of Indication", "RESULT", "REMARKS"]
                },
                PMI: {
                    title: "POSITIVE MATERIAL IDENTIFICATION",
                    fields: ["CLIENT", "SITE LOCATION", "PO NUMBER", "PROJECT NAME", "SALES ORDER", "INSPECTION AND TEST PLAN NUMBER", "PART NUMBER", "SERIAL NUMBER (SFO)", "DESCRIPTION OF EVENT", "TEST PROCEDURE", "TOTAL POINTS", "PMI INSTRUMENT MANUFACTURER", "MODEL", "SERIAL NO", "CALIBRATION DATE", "CALIBRATION DUE DATE"],
                    textareas: [],
                    columns: ["Sr.No", "Part Number", "Serial Number (SFO)", "Description", "Item", "Reading No", "PMI Result", "Design Material", "Cr", "Ni", "Mo", "Nb", "Fe", "Acceptance (Yes/No)"]
                },
                UTG: {
                    title: "ULTRASONIC THICKNESS GAUGING (UTG) REPORT",
                    fields: ["OWNER", "CONTRACTOR", "PROJECT TITLE", "REQUEST NO", "TESTED ITEM", "PROCEDURE/DOC NO", "ACCEPTANCE CRITERIA", "LOCATION", "DATE OF TESTING", "MATERIAL", "THICKNESS", "INSTRUMENT NAME/MAKE", "INSTRUMENT MODEL", "INSTRUMENT S/NO", "INSTRUMENT CALIBRATION DATE", "PROBE MAKE/MODEL", "PROBE S/NO", "PROBE FREQUENCY", "PROBE CABLE TYPE & LENGTH", "SURFACE TEMPERATURE", "SURFACE CONDITION", "COUPLANT TYPE", "POST CLEANING", "TECHNIQUE", "REFERENCE STANDARD"],
                    textareas: ["ITEM TESTED", "RESULT"],
                    columns: ["SL NO", "ISO DRAWING NO", "LINE NO", "JOINT NO", "SHT NO", "SIZE", "SCH", "READINGS", "REMARKS"]
                },
                PT: {
                    title: "LIQUID PENETRANT TEST REPORT",
                    fields: ["OWNER", "CLIENT", "LOCATION", "PROJECT NAME", "JOB NO", "REQUEST NO", "ITEM TESTED", "TEST PROCEDURE", "ACCEPTANCE SPEC", "TEST METHOD", "SURFACE CONDITION", "SURFACE TEMPERATURE", "MATERIAL", "TYPE OF PENETRANT", "METHOD OF APPLICATION", "REMOVER/CLEANER", "DWELLING TIME", "DEVELOPER", "DEVELOPING TIME", "LIGHT SOURCE INTENSITY", "LIGHT METER SERIAL NO"],
                    textareas: ["SCOPE OF EXAMINATION", "FINDINGS", "RESULT"],
                    columns: ["S/N", "TAID NO.", "LINE NO.", "JOINT NO", "SIZE", "SCH (THK)", "ROOT", "CAPPING", "WELDING PROCESS", "WPS NO", "WELD TYPE", "MAT'L", "Distance from Reference Point(mm)", "Type of indication", "RESULT", "REMARKS"],
                    hasComplexHeader: true
                }
            },
            signatures: ["Tested By :", "Reviewed by :", "Reviewed / Witness by :", "Reviewed / Witness by :"]
        };

        const app = {
            state: {
                currentStep: 0,
                dept: 'PT',
                client: '',
                date: '',
                reportData: {},
                tableData: [],
                images: [],
                signatures: {},
                grid: { rows: 2, cols: 3 },
                folderId: null
            },

            init() {
                document.getElementById('home-date').valueAsDate = new Date();
                this.loadDraft();
                this.setupSignatureCanvas();
                this.setupAutocomplete();

                setInterval(() => this.saveDraft(), 30000); // Auto-save
            },

            setupAutocomplete() {
                const input = document.getElementById('home-client');
                const dropdown = document.getElementById('client-autocomplete');

                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    if (val.length < 2) {
                        dropdown.style.display = 'none';
                        return;
                    }

                    // In real app, call backend: getClients(dept)
                    // Mocking for now
                    const mockClients = ["EXXON MOBIL", "JURONG ENGINEERING LIMITED", "SHELL CHEMICALS"];
                    const matches = mockClients.filter(c => c.toLowerCase().includes(val.toLowerCase()));

                    if (matches.length) {
                        dropdown.innerHTML = matches.map(m => `<div class="autocomplete-item" onclick="app.selectClient('${m}')">${m}</div>`).join('');
                        dropdown.style.display = 'block';
                    } else {
                        dropdown.style.display = 'none';
                    }
                });

                document.addEventListener('click', (e) => {
                    if (e.target !== input) dropdown.style.display = 'none';
                });
            },

            selectClient(name) {
                document.getElementById('home-client').value = name;
                document.getElementById('client-autocomplete').style.display = 'none';
            },

            startReport() {
                const dept = document.getElementById('home-dept').value;
                const client = document.getElementById('home-client').value.toUpperCase();
                const dateRaw = document.getElementById('home-date').value;

                if (!client || !dateRaw) {
                    this.showToast("Please fill all fields");
                    return;
                }

                // Format date to DD.MM.YYYY
                const d = new Date(dateRaw);
                const date = `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()}`;

                this.state.dept = dept;
                this.state.client = client;
                this.state.date = date;

                this.goToStep(1);
                document.getElementById('home-client').value = ''; // Clear for next time
            },

            goToStep(step) {
                this.state.currentStep = step;

                // Hide all screens
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-home').classList.remove('active');
                document.getElementById('wizard-container').style.display = 'block';

                // Step logic
                if (step === 1) {
                    this.renderStep1();
                } else if (step === 2) {
                    this.renderStep2();
                } else if (step === 3) {
                    this.renderStep3();
                } else if (step === 4) {
                    this.renderStep4();
                } else if (step === 5) {
                    this.renderPreview();
                }

                // Update UI
                document.querySelectorAll('.progress-step').forEach((ps, idx) => {
                    if (idx + 1 < step) ps.classList.add('completed');
                    else ps.classList.remove('completed');

                    if (idx + 1 === step) ps.classList.add('active');
                    else ps.classList.remove('active');
                });

                const labels = ["REPORT DETAILS", "DATA TABLE", "IMAGES", "SIGNATURES", "PREVIEW"];
                document.getElementById('step-label').innerText = `STEP ${step}: ${labels[step - 1] || 'PREVIEW'}`;

                const currentScreen = document.getElementById(`screen-step-${step}`) || document.getElementById('screen-preview');
                if (currentScreen) currentScreen.classList.add('active');

                document.getElementById('wizard-nav').style.display = step === 5 ? 'none' : 'flex';
                window.scrollTo(0, 0);
            },

            nextStep() {
                if (this.state.currentStep < 5) {
                    this.captureData();
                    this.goToStep(this.state.currentStep + 1);
                }
            },

            prevStep() {
                if (this.state.currentStep > 1) {
                    this.goToStep(this.state.currentStep - 1);
                } else {
                    document.getElementById('wizard-container').style.display = 'none';
                    document.getElementById('screen-home').classList.add('active');
                }
            },

            captureData() {
                const step = this.state.currentStep;
                if (step === 1) {
                    const inputs = document.querySelectorAll('#dept-fields-container input, #dept-fields-container textarea, #dept-fields-container select');
                    inputs.forEach(i => this.state.reportData[i.id] = i.value);
                } else if (step === 2) {
                    const rows = document.querySelectorAll('#table-body tr');
                    this.state.tableData = Array.from(rows).map(tr => {
                        const rowData = {};
                        tr.querySelectorAll('input').forEach(input => {
                            rowData[input.dataset.col] = input.value;
                        });
                        return rowData;
                    });
                }
            },

            renderStep1() {
                const config = CONFIG.departments[this.state.dept];
                const container = document.getElementById('dept-fields-container');

                let html = `
            <div class="report-section">
                <div class="section-title">${config.title}</div>
                <div style="float: right; text-align: right; font-size: 0.8rem; margin-bottom: 10px;">
                    REPORT NO: <input type="text" id="REPORT_NO" value="${this.state.reportData.REPORT_NO || ''}" style="width: 150px; padding: 4px;"><br>
                    MSE/REF/NO: <input type="text" id="REF_NO" value="${this.state.reportData.REF_NO || ''}" style="width: 150px; padding: 4px; margin-top: 5px;">
                </div>
                <div style="clear: both;"></div>
                <div class="field-grid">
        `;

                config.fields.forEach(f => {
                    const id = f.replace(/[^A-Z0-9]/g, '_');
                    const val = this.state.reportData[id] || (f === 'CLIENT' || f === 'OWNER' ? this.state.client : '');
                    html += `
                <div class="input-group">
                    <label>${f}</label>
                    <input type="text" id="${id}" value="${val}">
                </div>
            `;
                });

                config.textareas.forEach(f => {
                    const id = f.replace(/[^A-Z0-9]/g, '_');
                    const val = this.state.reportData[id] || '';
                    html += `
                <div class="input-group field-textarea">
                    <label>${f}</label>
                    <textarea id="${id}">${val}</textarea>
                </div>
            `;
                });

                html += `</div></div>`;
                container.innerHTML = html;
            },

            renderStep2() {
                const config = CONFIG.departments[this.state.dept];
                const head = document.getElementById('table-head');
                const body = document.getElementById('table-body');

                if (this.state.dept === 'PT') {
                    head.innerHTML = `
                        <tr>
                            <th rowspan="2">S/N</th>
                            <th rowspan="2">TAID NO.</th>
                            <th rowspan="2">LINE NO.</th>
                            <th rowspan="2">JOINT NO</th>
                            <th rowspan="2">SIZE</th>
                            <th rowspan="2">SCH (THK)</th>
                            <th colspan="2" style="text-align: center;">WELDING NO.</th>
                            <th rowspan="2">WELDING PROCESS</th>
                            <th rowspan="2">WPS NO</th>
                            <th rowspan="2">WELD TYPE</th>
                            <th rowspan="2">MAT'L</th>
                            <th rowspan="2">Distance from Reference Point (mm)</th>
                            <th rowspan="2">Type of indication</th>
                            <th rowspan="2">RESULT</th>
                            <th rowspan="2">REMARKS</th>
                        </tr>
                        <tr>
                            <th style="background: #002244;">ROOT</th>
                            <th style="background: #002244;">CAPPING</th>
                        </tr>
                    `;
                } else {
                    head.innerHTML = `<tr>${config.columns.map(c => `<th>${c}</th>`).join('')}</tr>`;
                }

                if (this.state.tableData.length === 0) {
                    for (let i = 0; i < 5; i++) this.addRow();
                } else {
                    body.innerHTML = '';
                    this.state.tableData.forEach(rowData => this.addRow(rowData));
                }
            },

            addRow(data = {}) {
                const config = CONFIG.departments[this.state.dept];
                const body = document.getElementById('table-body');
                const tr = document.createElement('tr');
                tr.innerHTML = config.columns.map(c => `
            <td><input type="text" data-col="${c}" value="${data[c] || ''}"></td>
        `).join('');
                body.appendChild(tr);
            },

            handleExcelUpload(input) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);

                    const config = CONFIG.departments[this.state.dept];
                    const body = document.getElementById('table-body');
                    body.innerHTML = '';

                    json.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = config.columns.map(c => {
                            // Try to match column name or index
                            const val = row[c] || row[Object.keys(row)[config.columns.indexOf(c)]] || '';
                            return `<td><input type="text" data-col="${c}" value="${val}"></td>`;
                        }).join('');
                        body.appendChild(tr);
                    });
                    this.showToast(`Imported ${json.length} rows`);
                };
                reader.readAsArrayBuffer(file);
            },

            renderStep3() {
                const container = document.getElementById('image-grid');
                const total = this.state.grid.rows * this.state.grid.cols;

                document.getElementById('grid-rows').innerText = this.state.grid.rows;
                document.getElementById('grid-cols').innerText = this.state.grid.cols;
                container.style.gridTemplateColumns = `repeat(${this.state.grid.cols}, 1fr)`;

                let html = '';
                for (let i = 0; i < total; i++) {
                    const img = this.state.images[i] || { src: '', caption: '' };
                    html += `
                <div class="image-card" onclick="app.triggerImageUpload(${i})">
                    ${img.src ? `<img src="${img.src}">` : '<span>TAP TO UPLOAD</span>'}
                    <input type="file" id="img-input-${i}" style="display: none;" accept="image/*" onchange="app.handleImage(this, ${i})">
                    <input type="text" class="image-caption" placeholder="Caption..." value="${img.caption}" 
                           onclick="event.stopPropagation()" onchange="app.updateImageCaption(${i}, this.value)">
                </div>
            `;
                }
                container.innerHTML = html;
            },

            adjustGrid(type, delta) {
                if (type === 'rows') this.state.grid.rows = Math.max(1, Math.min(5, this.state.grid.rows + delta));
                if (type === 'cols') this.state.grid.cols = Math.max(1, Math.min(4, this.state.grid.cols + delta));
                this.renderStep3();
            },

            triggerImageUpload(idx) {
                document.getElementById(`img-input-${idx}`).click();
            },

            handleImage(input, idx) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.state.images[idx] = {
                        src: e.target.result,
                        caption: this.state.images[idx]?.caption || '',
                        fileName: file.name
                    };
                    this.renderStep3();
                };
                reader.readAsDataURL(file);
            },

                if (!this.state.images[idx]) this.state.images[idx] = { src: '', caption: '' };

                </div>
            `;

            updateSigInfo(sigId, field, val) {
                if (!this.state.signatures[sigId]) this.state.signatures[sigId] = { name: '', level: 'NDT LEVEL II', image: '' };
                this.state.signatures[sigId][field] = val;
            },

            /** SIGNATURE CANVAS LOGIC */
            setupSignatureCanvas() {
                const canvas = document.getElementById('signature-canvas');
                const ctx = canvas.getContext('2d');
                let drawing = false;

                const start = (e) => {
                    drawing = true;
                    ctx.beginPath();
                    const pos = this.getCanvasPos(e);
                    ctx.moveTo(pos.x, pos.y);
                };

                const move = (e) => {
                    if (!drawing) return;
                    const pos = this.getCanvasPos(e);
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();
                };

                const stop = () => drawing = false;

                canvas.addEventListener('mousedown', start);
                canvas.addEventListener('mousemove', move);
                canvas.addEventListener('mouseup', stop);
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); });
                canvas.addEventListener('touchend', stop);

                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';

                // Handle resizing
                window.addEventListener('resize', () => {
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                });
            },

            getCanvasPos(e) {
                const canvas = document.getElementById('signature-canvas');
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            },

            openSignature(sigId, role) {
                this.activeSigId = sigId;
                const modal = document.getElementById('sig-modal');
                const canvas = document.getElementById('signature-canvas');
                document.getElementById('sig-title').innerText = role;
                modal.style.display = 'flex';
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                this.clearSignature();
            },

            clearSignature() {
                const canvas = document.getElementById('signature-canvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            },

            saveSignature() {
                const canvas = document.getElementById('signature-canvas');
                const imgData = canvas.toDataURL('image/png');
                if (!this.state.signatures[this.activeSigId]) {
                    this.state.signatures[this.activeSigId] = { name: '', level: 'NDT LEVEL II', image: '' };
                }
                this.state.signatures[this.activeSigId].image = imgData;
                document.getElementById('sig-modal').style.display = 'none';
                this.renderStep4();
            },

            handleSignatureUpload(input, sigId) {
                const file = input.files[0];

                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!this.state.signatures[sigId]) {

                    this.state.signatures[sigId].image = e.target.result;
                    this.renderStep4();
                };
                reader.readAsDataURL(file);
            },

                    <table style="font-size: 6.5pt; width: 100%; border-collapse: collapse; font-family: 'Source Sans 3', sans-serif; text-transform: uppercase; background: #fff; color: #000;">

                            .preview-page th { background: #fff !important; color: #000 !important; border: 1px solid #000 !important; }
                        </style>
                        <thead>
                            ${this.state.dept === 'PT' ? `
                                <tr style="font-size: 6pt;">
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 15px;">S/<br>N</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 45px;">TAID NO.</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 45px;">LINE NO.</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 30px;">JOINT NO</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 25px;">SIZE</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 30px;">SCH (THK)</th>
                                    <th colspan="2" style="border: 1px solid #000; padding: 2px; text-align: center; width: 80px;">WELDING NO.</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 50px;">WELDING PROCESS</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 35px;">WPS NO</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 30px;">WELD TYPE</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 35px;">MAT'L</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 60px;">Distance<br>from<br>Reference<br>Point(mm)</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 45px;">Type of indication</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px; width: 40px;">RESULT</th>
                                    <th rowspan="2" style="border: 1px solid #000; padding: 2px;">REMARKS</th>
                                </tr>
                                <tr>
                                    <th style="border: 1px solid #000; padding: 2px; width: 35px;">ROOT</th>
                                    <th style="border: 1px solid #000; padding: 2px; width: 45px;">CAPPING</th>
                                </tr>
                            ` : `
                                <tr>${config.columns.map(c => `<th style="border: 1px solid #000; padding: 2px;">${c}</th>`).join('')}</tr>
                            `}
                        </thead>
                        <tbody>
                            ${(() => {
                        const filteredData = this.state.tableData.filter(row => Object.values(row).some(v => v !== ''));
                        const rowsToShow = Math.max(1, filteredData.length); // Only show filled rows, minimum 1
                        let html = '';
                        for (let i = 0; i < rowsToShow; i++) {
                            const row = filteredData[i] || {};
                            html += `
                                    <tr>
                                        <td style="border: 1px solid #000; padding: 2px; text-align: center; height: 18px;">${i < filteredData.length || row.S_N ? i + 1 : ''}</td>
                                        ${config.columns.slice(1).map(col => `
                                            <td style="border: 1px solid #000; padding: 2px; text-align: center;">${row[col] || ''}</td>
                                        `).join('')}
                                    </tr>
                                `;
                        }
                        return html;
                    })()}
                        </tbody>
                    </table>
                    <div style="border-top: 2px solid #000; margin-top: auto; padding: 2px 0;">
                        ${sharedSignatures}
                        <div style="text-align: right; font-size: 5.5pt; padding: 1px 5px; font-family: 'Source Sans 3', sans-serif; font-weight: bold;">
                            FORM NO : MSE/NDT/${this.state.dept}/001 Rev.2A
                        </div>
                    </div>
                </div>
                ${sharedTerms}
            </div>

            <div class="preview-page" style="border: none; border-top: 1px solid #000;">
                <div style="text-align: center; margin-bottom: 5px;">
                    <img src="header logo.png" style="width: 100%; max-width: 800px;">
                </div>
                
                <div style="border: 1.5px solid #000; padding: 0; flex: 1; display: flex; flex-direction: column;">
                    <div style="border-bottom: 1px solid #000; text-align: center; padding: 5px; font-weight: bold; font-family: 'Source Sans 3', sans-serif; font-size: 11pt;">
                        ${config.title}
                    </div>
                    <div style="display: flex; justify-content: space-between; font-family: 'Source Sans 3', sans-serif; font-size: 8pt; font-weight: bold; padding: 4px; border-bottom: 1px solid #000;">
                        <span>REPORT NO : ${data.REPORT_NO || ''}</span>
                        <span>PAGE : 3 OF 3</span>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(${this.state.grid.cols}, 1fr); gap: 15px; margin-top: 10px; padding: 10px; align-content: start;">
                        ${this.state.images.filter(img => img && img.src).map(img => `
                            <div style="border: 1px solid #ccc; padding: 3px; text-align: center; background: #fafafa;">
                                <img src="${img.src}" style="width: 100%; aspect-ratio: 4/3; object-fit: cover; border: 1px solid #ddd;">
                                <div style="font-size: 8pt; font-weight: bold; margin-top: 3px; text-transform: uppercase; color: #444;">${img.caption}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="border-top: 2px solid #000; margin-top: auto; padding: 2px 0;">
                        ${sharedSignatures}
                        <div style="text-align: right; font-size: 5.5pt; padding: 1px 5px; font-family: 'Source Sans 3', sans-serif; font-weight: bold;">
                            FORM NO : MSE/NDT/${this.state.dept}/001 Rev.2A
                        </div>
                    </div>
                </div>

                ${sharedTerms}
            </div>
        `;
                container.innerHTML = html;
            },

            /** DATA PERSISTENCE & SYNC */
            loadSampleData() {
                document.getElementById('home-dept').value = 'PT';
                document.getElementById('home-client').value = 'EXXON MOBIL';
                document.getElementById('home-date').value = '2026-04-16';

                this.state.reportData = {
                    OWNER: 'EXXON MOBIL',
                    CLIENT: 'EXXON MOBIL',
                    LOCATION: 'PDU SITE',
                    PROJECT_NAME: 'PAC TA 2026',
                    JOB_NO: 'PDU PIPING',
                    REPORT_NO: 'MSE/SEK/EM/PT/F-031',
                    REF_NO: 'D2-26-2919',
                    RESULT: 'ACCEPTABLE'
                };

                this.state.signatures = {
                    'sig_0': { name: 'A.UDHAYANITHI', level: 'NDT LEVEL II', image: '' },
                    'sig_1': { name: 'SURENDRAKUMAR P.V', level: 'ASNT NDT LEVEL III', image: '' }
                };

                this.showToast("Sample PT data loaded");
            },

            saveDraft() {
                localStorage.setItem('masterscan_draft', JSON.stringify(this.state));
            },

            loadDraft() {
                const draft = localStorage.getItem('masterscan_draft');
                if (draft) {
                    document.getElementById('resume-draft-container').style.display = 'block';
                }
            },

            resumeDraft() {
                const draft = JSON.parse(localStorage.getItem('masterscan_draft'));
                Object.assign(this.state, draft);
                this.goToStep(1);
            },

            showToast(msg) {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            },

            /** BACKEND SYNC (MOCK/REAL) */
            async loadReport() {
                const docId = document.getElementById('load-doc-id').value.trim();
                if (!docId) return alert("Please enter a Document ID");

                this.showLoader(true);
                try {
                    const response = await fetch(`${this.SCRIPT_URL}?action=getReport&docId=${docId}`);
                    const result = await response.json();
                    if (result.status === "error") throw new Error(result.message);

                    // Map result back to state
                    this.state.reportData = result.reportData || {};
                    this.state.tableData = result.tableData || [];
                    this.state.signatures = result.signatures || {};
                    this.state.images = result.images || [];

                    // Set department if found
                    if (result.dept) this.state.dept = result.dept;

                    this.goToStep(1);
                    alert("Report loaded successfully!");
                } catch (err) {
                    alert("Error loading report: " + err.message);
                } finally {
                    this.showLoader(false);
                }
            },

            async saveReport() {
                this.showToast("Creating folders and saving report...");

                // Use the provided script URL
                this.SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpzBNpy0IZbFJkH3-xA8nlpJHbCgJOJ69drUqClIL28ztKNKY0ev7C-n5V5JyfHT2Z/exec';

                try {
                    // 1. Create Hierarchy
                    const folderRes = await this.callApi({
                        action: 'createFolders',
                        dept: this.state.dept,
                        client: this.state.client,
                        date: this.state.date
                    });

                    const folderId = folderRes.folderId;

                    // 2. Save Images
                    for (let i = 0; i < this.state.images.length; i++) {
                        const img = this.state.images[i];
                        if (img && img.src) {
                            await this.callApi({
                                action: 'uploadImage',
                                folderId: folderId,
                                imageBase64: img.src,
                                fileName: img.fileName || `photo_${i}.jpg`
                            });
                        }
                    }

                    // 3. Save Data Sheet
                    await this.callApi({
                        action: 'saveSheet',
                        folderId: folderId,
                        tableData: this.state.tableData,
                        dept: this.state.dept
                    });

                    // 4. Save Final Doc
                    const reportData = {};
                    // Clean keys: replace all non-alphanumeric with underscore and uppercase
                    for (let k in this.state.reportData) {
                        const cleanKey = k.toUpperCase().replace(/[^A-Z0-9]/g, '_');
                        reportData[cleanKey] = this.state.reportData[k];
                    }
                    reportData.date = this.state.date;
                    reportData.client = this.state.client;

                    // Add signatures with specific keys for backend mapping
                    const sigRoles = ["Tested_By", "Reviewed_By", "Reviewed_Witness_By_1", "Reviewed_Witness_By_2"];
                    const roles = CONFIG.signatures;
                    const signatureImages = {};

                    roles.forEach((role, idx) => {
                        const sigId = `sig_${idx}`;
                        const sig = this.state.signatures[sigId] || {};
                        const key = sigRoles[idx];
                        // Ensure keys sent to backend are EXACTLY what it expects
                        reportData[key + '_NAME'] = sig.name || "";
                        reportData[key + '_LEVEL'] = sig.level || "";
                        if (sig.image) signatureImages[key] = sig.image;
                    });

                    // Extract CSS to send to backend for Word/PDF formatting
                    let extractedStyles = "";
                    try {
                        const styleTags = document.querySelectorAll('style');
                        styleTags.forEach(tag => extractedStyles += tag.innerHTML + "\n");
                    } catch (e) { }

                    const docRes = await this.callApi({
                        action: 'saveReport',
                        folderId: folderId,
                        reportData: reportData,
                        tableData: this.state.tableData,
                        signatureImages: signatureImages,
                        dept: this.state.dept,
                        images: this.state.images,
                        previewHtml: `<style>${extractedStyles}</style>` + document.getElementById('preview-container').innerHTML
                    });

                    // Success
                    document.getElementById('screen-preview').classList.remove('active');
                    document.getElementById('screen-success').classList.add('active');
                    document.getElementById('success-path').innerText = `Masterscan Reporting / ${this.state.dept} / ${this.state.client} / ${this.state.date}`;
                    document.getElementById('drive-link').href = folderRes.folderUrl;
                    document.getElementById('pdf-link').href = docRes.pdfUrl;

                    localStorage.removeItem('masterscan_draft');

                } catch (err) {
                    console.error(err);
                    this.showToast("Error saving. Check console.");
                }
            },

            async callApi(data) {
                console.log("Calling GAS API with:", data);
                try {
                    const response = await fetch(this.SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    return result;

                } catch (err) {
                    console.error("API Error:", err);
                    this.showToast("Connection error. Using mock response.");
                    return {
                        folderId: 'mock-folder-id',
                        folderUrl: 'https://drive.google.com',
                        docId: 'mock-doc-id'
                    };
                }
            }
        };

        app.init();
        window.app = app; // For debugging
    </script>
</body>
